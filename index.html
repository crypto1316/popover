<!DOCTYPE html>
<html lang="en">
<head>
  <title>Bootstrap Popover</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">

  <!-- JS -->
  <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.slim.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>

  <style>
    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #f4f6f9;
    }
    .box button {
      margin: 10px;
    }
  </style>
</head>

<body>

<div class="box text-center">

  <h4>Popover - All Sides</h4>

  <!-- Top -->
  <button class="btn btn-primary" data-toggle="popover" data-placement="top"
    title="Top Title" data-content="This is top popover">
    Top
  </button>

  <!-- Right -->
  <button class="btn btn-success" data-toggle="popover" data-placement="right"
    title="Right Title" data-content="This is right popover">
    Right
  </button>

  <!-- Bottom -->
  <button class="btn btn-warning" data-toggle="popover" data-placement="bottom"
    title="Bottom Title" data-content="This is bottom popover">
    Bottom
  </button>

  <!-- Left -->
  <button class="btn btn-danger" data-toggle="popover" data-placement="left"
    title="Left Title" data-content="This is left popover">
    Left
  </button>

  <br><br>

  <!-- Click Trigger -->
  <button class="btn btn-dark" data-toggle="popover" data-trigger="click"
    title="Click Popover" data-content="Click to toggle">
    Click Me
  </button>

  <!-- Hover Trigger -->
  <button class="btn btn-info" data-toggle="popover" data-trigger="hover"
    title="Hover Popover" data-content="Hover to see">
    Hover Me
  </button>

</div>

<!-- Activate Popover -->
<script>
  $(function () {
    $('[data-toggle="popover"]').popover()
  })
</script>

</body>
</html>
